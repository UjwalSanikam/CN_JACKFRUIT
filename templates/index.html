<!DOCTYPE html>
<html>
<head>
    <title>StreamServer Pro</title>
    <style>
        /* Modern Dark Theme CSS */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { 
            background: rgba(30, 30, 46, 0.85); 
            padding: 40px; 
            border-radius: 16px; 
            width: 420px; 
            box-shadow: 0px 8px 32px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 { 
            color: #1db954; 
            margin-top: 0; 
            font-size: 28px;
            text-align: center;
            letter-spacing: 1px;
        }
        .subtitle {
            text-align: center;
            color: #a0a0b0;
            font-size: 14px;
            margin-bottom: 30px;
        }
        label {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
            display: block;
            margin-bottom: 8px;
        }
        select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 25px; 
            background: #2a2a3a; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 8px; 
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        select:focus {
            border: 1px solid #1db954;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #1db954; 
            color: #000; 
            border: none; 
            font-weight: bold; 
            font-size: 16px;
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { 
            background: #1ed760; 
            box-shadow: 0px 0px 15px rgba(29, 185, 84, 0.5);
            transform: translateY(-2px);
        }
        /* Custom Glowing Progress Bar */
        progress { 
            width: 100%; 
            height: 12px; 
            margin-top: 15px; 
            border-radius: 6px;
            background-color: #2a2a3a;
        }
        progress::-webkit-progress-bar {
            background-color: #2a2a3a;
            border-radius: 6px;
        }
        progress::-webkit-progress-value {
            background: linear-gradient(90deg, #1db954, #1ed760);
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.7);
        }
        .status-container { 
            margin-top: 30px; 
            text-align: center; 
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
        }
        #status {
            color: #a0a0b0;
            font-size: 14px;
            margin: 0;
        }
        #percentage {
            color: #ffffff;
            font-size: 24px;
            margin: 10px 0 0 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>StreamServer Pro</h2>
        <div class="subtitle">TCP Adaptive Audio Delivery</div>
        
        <label>Select a track from the server:</label>
        <select id="songSelect">
            {% if songs %}
                {% for song in songs %}
                    <option value="{{ song }}">{{ song }}</option>
                {% endfor %}
            {% else %}
                <option value="" disabled selected>No MP3 files found on server or server offline</option>
            {% endif %}
        </select>
        
        <button onclick="startDownload()">Start Stream</button>
        
        <div class="status-container">
            <p id="status">Ready to connect.</p>
            <progress id="progressBar" value="0" max="100"></progress>
            <h3 id="percentage">0%</h3>
        </div>
    </div>

    <script>
        function startDownload() {
            const song = document.getElementById('songSelect').value;
            if (!song) return; // Don't do anything if no song is selected
            
            document.getElementById('status').innerText = "Connecting to TCP Port 65432...";
            
            fetch('/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({song_name: song})
            });
        }

        setInterval(() => {
            fetch('/progress')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('progressBar').value = data.progress;
                    document.getElementById('percentage').innerText = data.progress + "%";
                    document.getElementById('status').innerText = data.message;
                })
                .catch(err => console.log("Waiting for backend..."));
        }, 500);
    </script>
</body>
</html>
